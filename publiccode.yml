description:
  en:
    shortDescription: Orthanc is a lightweight DICOM server for medical imaging
    longDescription: Orthanc is a standalone DICOM software server. It is designed
      to improve the DICOM flows in hospitals and to support research about the
      automated analysis of medical images. Orthanc lets its users focus on the
      content of the DICOM files, hiding the complexity of the DICOM format and
      of the DICOM protocol.
    documentation: https://orthanc.uclouvain.be/book/
    apiDocumentation: https://orthanc.uclouvain.be/api/
